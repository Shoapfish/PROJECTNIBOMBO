<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
	  <link rel="stylesheet" href="{{ url_for('static', filename='Style/logReg/login.css') }}">
    <style>
  body::before {
    background-image: url("{{ url_for('static', filename='img/login/background.png') }}");
  }
</style>

</head>
<body>
 
  <!-- Animated background canvas -->
  <canvas id="flowerCanvas"></canvas>
 
  <div class="login-holder">
    <div class="flower-deco">🌸</div>
    <h2 class="login-header">Welcome Back</h2>
    <p class="login-subheader">Sign in to continue</p>
 
    <form action="/login" method="POST">
      <input name="username" placeholder="✦  Username" required>
      <input name="password" type="password" placeholder="✦  Password" required>
      <button type="submit" class="button-login">Login</button>
    </form>

    <img src="{{ url_for('static', filename='img/login/background.png') }}" alt="">
 
    <p class="no-account">Don't have an account? <a href="/register" class="register-here">Register here</a></p>
  </div>
 
  <script src="{{ url_for('static', filename='javascript/login.js') }}"> </script>
</body>
</html>
